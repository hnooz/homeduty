services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: homeduty-app
    restart: unless-stopped
    working_dir: /var/www/src
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/src/vendor
      - storage_data:/var/www/src/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: homeduty
      DB_USERNAME: homeduty
      DB_PASSWORD: homeduty
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VIEW_COMPILED_PATH: /var/www/src/storage/framework/views
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: homeduty-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  mysql:
    image: mysql:8.4
    container_name: homeduty-mysql
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: homeduty
      MYSQL_USER: homeduty
      MYSQL_PASSWORD: homeduty
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: homeduty-redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: homeduty-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=1 --timeout=120
    working_dir: /var/www/src
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/src/vendor
      - storage_data:/var/www/src/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: homeduty
      DB_USERNAME: homeduty
      DB_PASSWORD: homeduty
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VIEW_COMPILED_PATH: /var/www/src/storage/framework/views
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: homeduty-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    working_dir: /var/www/src
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/src/vendor
      - storage_data:/var/www/src/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: homeduty
      DB_USERNAME: homeduty
      DB_PASSWORD: homeduty
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VIEW_COMPILED_PATH: /var/www/src/storage/framework/views
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  vendor_data:
  storage_data:
